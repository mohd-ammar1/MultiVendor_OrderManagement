<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<div class="container">
    <form th:action="@{/auth/signUp}" th:method="post" th:object="${signUpDTO}">
        <label for="emailf">Email:</label>
        <input type="email" name="emailf" id="emailf" th:field="*{email}"/>
        <br>
        <label for="passf">Password</label>
        <input type="password" name="passf" id="passf" th:field="*{password}"/>
        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</div>
</body>
</html>
