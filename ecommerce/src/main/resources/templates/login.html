<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" th:href="@{/css/HomeStyles.css}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script th:src="@{/js/HomeScript.js}"></script>
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4" style="width: 400px;">

        <h3 class="text-center mb-4">Login</h3>

        <form th:action="@{/auth/login}" th:method="post" th:object="${loginobj}">

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>

                <input type="email"
                       class="form-control"
                       name="email"
                       placeholder="Enter your email"
                       th:field="*{email}"
                       required>
                <small class="text-danger" th:if="${emailError}" th:text="${emailError}"></small>

            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>

                <input type="password"
                       class="form-control"
                       name="password"
                       placeholder="Enter your password"
                       th:field="*{password}"
                       required>
                <small class="text-danger" th:if="${passError}" th:text="${passError}"></small>
            </div>

            <!-- Remember Me -->
            <div class="form-check mb-3">
                <input class="form-check-input"
                       type="checkbox"
                       id="rememberMe"
                       name="remember-me">

                <label class="form-check-label" for="rememberMe">
                    Remember Me
                </label>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>

            <!-- Signup Link -->
            <div class="text-center mt-3">
                <small>
                    Don't have an account?
                    <a th:href="@{/signup}">Sign Up</a>
                </small>
            </div>

        </form>

    </div>

</div>

</body>
</html>
